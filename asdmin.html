<!DOCTYPE html>

<style>

  .edit-btn {
  background: #0070f3;
  border: none;
  padding: 6px 12px;
  color: #fff;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  margin-left: 5px;
}

.edit-btn:hover {
  background: #0059c9;
}
* {
  box-sizing: border-box;
  font-family: 'Inter', Arial, sans-serif;
}

body {
  margin: 0;
  background: #f5f7fa;
}

/* LOGIN */
.login-container {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 100%;
  max-width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #4D148C;
}

/* DASHBOARD */
.dashboard {
  display: none;
  padding: 20px;
}

.header {
  background: #4D148C;
  color: #fff;
  padding: 15px;
  font-weight: bold;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

.card h2 {
  margin-bottom: 15px;
  color: #4D148C;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #4D148C;
  color: #fff;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #3a0f6f;
}

/* MOBILE */
@media(max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

  table th, table td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
  font-size: 14px;
}

table tr:hover {
  background: #f9f9f9;
}
  /* SELECT DROPDOWN */
.select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  background: #fff;
  color: #333;
  cursor: pointer;

  /* remove ugly default styles */
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  /* custom arrow */
  background-image: url("data:image/svg+xml;utf8,<svg fill='%234D148C' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 16px;
}

/* HOVER */
.select:hover {
  border-color: #4D148C;
}

/* FOCUS */
.select:focus {
  outline: none;
  border-color: #4D148C;
  box-shadow: 0 0 0 2px rgba(77, 20, 140, 0.1);
}

/* MOBILE FIX */
@media(max-width: 768px) {
  .select {
    font-size: 16px;
  }
}

  .delete-btn {
  background: #ff4d4f;
  border: none;
  padding: 6px 12px;
  color: #fff; /* 🔥 change from black to white */
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
}

.delete-btn:hover {
  background: #d9363e;
}
</style>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginBox">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="header">
  CargEx Admin Dashboard
  <button onclick="logout()" style="float:right;width:auto;padding:6px 12px;margin-left:10px;background:#FF6600;">
    Logout
  </button>
</div>

  <div class="grid">

    <!-- CREATE -->
<div class="card">
  <h2>Create Shipment</h2>

  <input id="email" placeholder="Customer Email">

  <!-- Sender -->
  <input id="senderName" placeholder="Sender Name">
  <input id="from" placeholder="From Location">

  <!-- Receiver -->
  <input id="receiverName" placeholder="Receiver Name">
  <input id="to" placeholder="Destination">

  <!-- Shipment Details -->
  <input id="weight" placeholder="Weight (KG)">
  <input id="product" placeholder="Product">

  <select id="service" class="select">
    <option value="">Select Service Type</option>
    <option>Standard Shipping</option>
    <option>Express Delivery</option>
    <option>Overnight</option>
  </select>

  <input id="carrier" placeholder="Carrier (e.g. DHL, UPS, FedEx)">

  <!-- Dates -->
  <label style="font-size:12px;color:#888;">Sent Date</label>
  <input id="sentDate" type="date">

  <label style="font-size:12px;color:#888;">Expected Delivery</label>
  <input id="expectedDelivery" type="date">

  <button onclick="create()">Create Shipment</button>
</div>

    <!-- UPDATE -->
    <div class="card">
      <h2>Update Shipment</h2>
      <input id="track" placeholder="Tracking Number">
      
      <select id="status" class="select">
        <option> -Select- </option>
  <option>Shipment created / Processing </option>
  <option>In Transit</option>
        <option>Customs</option>
  <option>Out for Delivery</option>
  <option>Delivered</option>
</select>
      <input id="location" placeholder="Current Location">
      <button onclick="update()">Update Shipment</button>
    </div>

  </div>
<div class="card" style="margin-top:20px;">
  <h2>All Shipments</h2>

  <div style="overflow-x:auto;">
    <table id="shipmentTable" style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="background:#4D148C;color:#fff;">
  <th>Tracking</th>
  <th>Email</th>
  <th>Sender Name</th>
  <th>Receiver Name</th>
  <th>From</th>
  <th>To</th>
  <th>Status</th>
  <th>Location</th>
  <th>Sent Date</th>
  <th>Expected Delivery</th>
  <th>Action</th>
</tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
</div>

<script>
const API = "https://xn--km-xqa.com/";
const TOKEN = "securetoken123";

// 🔐 CHECK LOGIN ON LOAD
window.onload = function() {
  const loggedIn = localStorage.getItem("admin_logged_in");

  if (loggedIn === "true") {
    showDashboard(); // ✅ CALL IT
  }
};
// 🔐 LOGIN
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "cargex-91usr" && pass === "delisi23") {
    localStorage.setItem("admin_logged_in", "true");
    showDashboard();
  } else {
    alert("Invalid login");
  }
}

// 🚪 LOGOUT
function logout() {
  localStorage.removeItem("admin_logged_in");
  location.reload();
}

// SHOW DASHBOARD

  function showDashboard() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadShipments(); // 🔥 THIS WAS MISSING
}


// 📦 CREATE
async function create() {
  try {
    const res = await fetch(API + "create.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": TOKEN
      },
      body: JSON.stringify({
        email: email.value,
        from: from.value,
        to: to.value,

        sender_name: senderName.value,
        receiver_name: receiverName.value,

        weight: weight.value,
        product: product.value,
        service: service.value,
        carrier: carrier.value,

        sent_date: sentDate.value,
        expected_delivery: expectedDelivery.value
      })
    });

    const text = await res.text();
    console.log("RAW:", text);

    const data = JSON.parse(text);

    if (data.tracking) {
      alert("✅ Tracking Created: " + data.tracking);
      loadShipments();
    } else {
      alert("❌ " + (data.error || "Error"));
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}
// 🔄 UPDATE
async function update() {
  const tracking = document.getElementById("track").value;
  const statusVal = document.getElementById("status").value;
  const locationVal = document.getElementById("location").value;

  // 🔥 VALIDATION
  if (!tracking || !statusVal || !locationVal) {
    alert("❌ Please fill all fields");
    return;
  }

  try {
    const res = await fetch(API + "update.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": TOKEN
      },
      body: JSON.stringify({
        tracking: tracking,
        status: statusVal,
        location: locationVal
      })
    });

    const text = await res.text();
    console.log("UPDATE RAW:", text);

    const data = JSON.parse(text);

    if (data.status === "updated") {
      alert("✅ Shipment Updated");
      loadShipments();
    } else {
      alert("❌ " + (data.error || "Update failed"));
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}
</script>
<script>
// 📊 LOAD SHIPMENTS
async function loadShipments() {
  try {
    console.log("Fetching shipments...");

    const res = await fetch(API + "get_shipments.php");
    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    const data = JSON.parse(text);

    const tbody = document.querySelector("#shipmentTable tbody");
    tbody.innerHTML = "";

  data.forEach(item => {
  tbody.innerHTML += `
<tr>
  <td>${item.tracking}</td>
  <td>${item.email}</td>

  <td>${item.sender_name || '-'}</td>
  <td>${item.receiver_name || '-'}</td>

  <td>${item.sender}</td>
  <td>${item.receiver}</td>

  <td>${item.status}</td>
  <td>${item.location}</td>

  <td>${formatDate(item.sent_date)}</td>
  <td>${formatDate(item.expected_delivery)}</td>

  <td>
    <button class="delete-btn" onclick="deleteShipment('${item.tracking}')">
      Delete
    </button>

    <button class="edit-btn" onclick='editShipment(${JSON.stringify(item)})'>
      Edit
    </button>
  </td>
</tr>
`;
});

  } catch (err) {
    console.error("ERROR:", err);
  }
}

  async function deleteShipment(tracking) {
  if (!confirm("⚠️ Are you sure you want to delete this shipment?")) return;

  try {
    const res = await fetch(API + "delete.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": TOKEN
      },
      body: JSON.stringify({ tracking })
    });

    const data = await res.json();

    if (data.status === "deleted") {
      alert("✅ Shipment deleted");
      loadShipments();
    } else {
      alert("❌ " + (data.error || "Delete failed"));
    }

  } catch (err) {
    alert("Server error");
  }
}
</script>
  <script>
    function editShipment(item) {
  document.getElementById("track").value = item.tracking;
  document.getElementById("status").value = item.status;
  document.getElementById("location").value = item.location;

  alert("✏️ Editing shipment: " + item.tracking);
}
  </script>
  <script>
    function formatDate(dateStr) {
  if (!dateStr) return "-";

  const date = new Date(dateStr);

  return date.toLocaleDateString("en-US", {
    month: "short",
    day: "numeric",
    year: "numeric"
  });
}
  </script>
