<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Inter', Arial, sans-serif;
}

body {
  margin: 0;
  background: #f5f7fa;
}

/* LOGIN */
.login-container {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 100%;
  max-width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #4D148C;
}

/* DASHBOARD */
.dashboard {
  display: none;
  padding: 20px;
}

.header {
  background: #4D148C;
  color: #fff;
  padding: 15px;
  font-weight: bold;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

.card h2 {
  margin-bottom: 15px;
  color: #4D148C;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #4D148C;
  color: #fff;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #3a0f6f;
}

/* MOBILE */
@media(max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

  table th, table td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
  font-size: 14px;
}

table tr:hover {
  background: #f9f9f9;
}
  /* SELECT DROPDOWN */
.select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  background: #fff;
  color: #333;
  cursor: pointer;

  /* remove ugly default styles */
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  /* custom arrow */
  background-image: url("data:image/svg+xml;utf8,<svg fill='%234D148C' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 16px;
}

/* HOVER */
.select:hover {
  border-color: #4D148C;
}

/* FOCUS */
.select:focus {
  outline: none;
  border-color: #4D148C;
  box-shadow: 0 0 0 2px rgba(77, 20, 140, 0.1);
}

/* MOBILE FIX */
@media(max-width: 768px) {
  .select {
    font-size: 16px;
  }
}

  .delete-btn {
  background: #ff4d4f;
  border: none;
  padding: 6px 12px;
  color: #fff; /* 🔥 change from black to white */
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
}

.delete-btn:hover {
  background: #d9363e;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginBox">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="header">
  FedEx Admin Dashboard
  <button onclick="logout()" style="float:right;width:auto;padding:6px 12px;margin-left:10px;background:#FF6600;">
    Logout
  </button>
</div>

  <div class="grid">

    <!-- CREATE -->
    <div class="card">
      <h2>Create Shipment</h2>
      <input id="email" placeholder="Customer Email">
      <input id="from" placeholder="From">
      <input id="to" placeholder="To">
      <input id="estimated" placeholder="Estimated Delivery">
      <button onclick="create()">Create Shipment</button>
    </div>

    <!-- UPDATE -->
    <div class="card">
      <h2>Update Shipment</h2>
      <input id="track" placeholder="Tracking Number">
      
      <select id="status" class="select">
  <option>Shipment created</option>
  <option>In Transit</option>
  <option>Out for Delivery</option>
  <option>Delivered</option>
</select>
      <input id="location" placeholder="Current Location">
      <button onclick="update()">Update Shipment</button>
    </div>

  </div>
<div class="card" style="margin-top:20px;">
  <h2>All Shipments</h2>

  <div style="overflow-x:auto;">
    <table id="shipmentTable" style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="background:#4D148C;color:#fff;">
          <th style="padding:10px;">Tracking</th>
          <th>Email</th>
          <th>From</th>
          <th>To</th>
          <th>Status</th>
          <th>Location</th>
          <th>Estimated</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
</div>

<script>
const API = "https://xn--km-xqa.com/";
const TOKEN = "securetoken123";

// 🔐 CHECK LOGIN ON LOAD
window.onload = function() {
  const loggedIn = localStorage.getItem("admin_logged_in");

  if (loggedIn === "true") {
    showDashboard(); // ✅ CALL IT
  }
};
// 🔐 LOGIN
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "fedex-91usr" && pass === "delisi23") {
    localStorage.setItem("admin_logged_in", "true");
    showDashboard();
  } else {
    alert("Invalid login");
  }
}

// 🚪 LOGOUT
function logout() {
  localStorage.removeItem("admin_logged_in");
  location.reload();
}

// SHOW DASHBOARD

  function showDashboard() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadShipments(); // 🔥 THIS WAS MISSING
}


// 📦 CREATE
async function create() {
  try {
    const res = await fetch(API + "create.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": TOKEN
      },
      body: JSON.stringify({
        email: email.value,
        from: from.value,
        to: to.value,
        estimated: estimated.value
      })
    });

    const data = await res.json();

    if (data.tracking) {
  alert("✅ Tracking Created: " + data.tracking);
  loadShipments(); // 🔥 ADD THIS LINE
} else {
  alert("❌ Error creating shipment");
}

  } catch (err) {
    alert("Server error");
  }
}

// 🔄 UPDATE
async function update() {
  const tracking = document.getElementById("track").value;
  const statusVal = document.getElementById("status").value;
  const locationVal = document.getElementById("location").value;

  // 🔥 VALIDATION
  if (!tracking || !statusVal || !locationVal) {
    alert("❌ Please fill all fields");
    return;
  }

  try {
    const res = await fetch(API + "update.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": TOKEN
      },
      body: JSON.stringify({
        tracking: tracking,
        status: statusVal,
        location: locationVal
      })
    });

    const text = await res.text();
    console.log("UPDATE RAW:", text);

    const data = JSON.parse(text);

    if (data.status === "updated") {
      alert("✅ Shipment Updated");
      loadShipments();
    } else {
      alert("❌ " + (data.error || "Update failed"));
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}
</script>
<script>
// 📊 LOAD SHIPMENTS
async function loadShipments() {
  try {
    console.log("Fetching shipments...");

    const res = await fetch(API + "get_shipments.php");
    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    const data = JSON.parse(text);

    const tbody = document.querySelector("#shipmentTable tbody");
    tbody.innerHTML = "";

  data.forEach(item => {
  tbody.innerHTML += `
    <tr>
      <td>${item.tracking}</td>
      <td>${item.email}</td>
      <td>${item.sender}</td>
      <td>${item.receiver}</td>
      <td>${item.status}</td>
      <td>${item.location}</td>
      <td>${item.estimated}</td>
      <td>
        <button class="delete-btn" onclick="deleteShipment('${item.tracking}')">
          Delete
        </button>
      </td>
    </tr>
  `;
});

  } catch (err) {
    console.error("ERROR:", err);
  }
}

  async function deleteShipment(tracking) {
  if (!confirm("⚠️ Are you sure you want to delete this shipment?")) return;

  try {
    const res = await fetch(API + "delete.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": TOKEN
      },
      body: JSON.stringify({ tracking })
    });

    const data = await res.json();

    if (data.status === "deleted") {
      alert("✅ Shipment deleted");
      loadShipments();
    } else {
      alert("❌ " + (data.error || "Delete failed"));
    }

  } catch (err) {
    alert("Server error");
  }
}
</script>
</body>
</html>
