<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Auto Redirect -->
  <meta http-equiv="refresh" content="5;url=https://mycargex.com/" />

  <title>CargEx | Redirecting...</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
      color:#fff;
      overflow:hidden;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:650px;
      text-align:center;
      padding:50px 30px;
      border-radius:24px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(14px);
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
      animation:fadeIn 1s ease;
      position:relative;
    }

    .logo{
      font-size:42px;
      font-weight:800;
      margin-bottom:25px;
      letter-spacing:1px;
    }

    .logo span{
      color:#38bdf8;
    }

    .icon{
      width:90px;
      height:90px;
      margin:0 auto 25px;
      border:4px solid rgba(255,255,255,0.1);
      border-top:4px solid #38bdf8;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    h1{
      font-size:2.5rem;
      margin-bottom:15px;
      font-weight:700;
    }

    p{
      font-size:1.08rem;
      line-height:1.8;
      color:#d1d5db;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      padding:14px 34px;
      border-radius:50px;
      background:#38bdf8;
      color:#fff;
      text-decoration:none;
      font-weight:700;
      transition:0.3s ease;
      box-shadow:0 8px 20px rgba(56,189,248,0.3);
    }

    .btn:hover{
      background:#0ea5e9;
      transform:translateY(-3px);
    }

    .countdown{
      margin-top:25px;
      font-size:0.95rem;
      color:#94a3b8;
    }

    .footer{
      margin-top:30px;
      font-size:0.9rem;
      color:#64748b;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:600px){

      .container{
        padding:40px 22px;
      }

      h1{
        font-size:2rem;
      }

      p{
        font-size:1rem;
      }

      .logo{
        font-size:34px;
      }

      .icon{
        width:75px;
        height:75px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      Carg<span>Ex</span>
    </div>

    <div class="icon"></div>

    <h1>Redirecting You...</h1>

    <p>
      Our new platform is now available.<br>
      You will automatically be redirected to the official CargEx website in a few seconds.
    </p>

    <a href="https://mycargex.com/" class="btn">
      Go to MyCargEx
    </a>

    <div class="countdown">
      Automatic redirect in <span id="timer">5</span> seconds...
    </div>

    <div class="footer">
      © 2026 CargEx. All rights reserved.
    </div>

  </div>

  <script>
    let timeLeft = 5;
    const timer = document.getElementById("timer");

    const countdown = setInterval(() => {
      timeLeft--;
      timer.textContent = timeLeft;

      if(timeLeft <= 0){
        clearInterval(countdown);
        window.location.href = "https://mycargex.com/";
      }
    }, 1000);
  </script>

</body>
</html>
