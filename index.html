
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Under Maintenance</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg, #0f172a, #1e293b);
      color:#fff;
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:40px 25px;
      width:90%;
      max-width:600px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:20px;
      box-shadow:0 8px 30px rgba(0,0,0,0.3);
      animation:fadeIn 1.2s ease;
    }

    .icon{
      font-size:80px;
      margin-bottom:20px;
      animation:rotate 5s linear infinite;
    }

    h1{
      font-size:2.5rem;
      margin-bottom:15px;
    }

    p{
      font-size:1.1rem;
      line-height:1.7;
      color:#d1d5db;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      padding:14px 28px;
      background:#38bdf8;
      color:#fff;
      text-decoration:none;
      border-radius:50px;
      font-weight:bold;
      transition:0.3s ease;
    }

    .btn:hover{
      background:#0ea5e9;
      transform:translateY(-3px);
    }

    .footer{
      margin-top:25px;
      font-size:0.9rem;
      color:#94a3b8;
    }

    @keyframes rotate{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width:600px){
      h1{
        font-size:2rem;
      }

      p{
        font-size:1rem;
      }

      .icon{
        font-size:60px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">⚙️</div>

    <h1>Website Under Maintenance</h1>

    <p>
      We are currently improving our website to give you a better experience.
      Please check back again soon.
    </p>

    <a href="#" class="btn">Refresh Page</a>

    <div class="footer">
      © 2026 CargEx. All rights reserved.
    </div>
  </div>

</body>
</html>
